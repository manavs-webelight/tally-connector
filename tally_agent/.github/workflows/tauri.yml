name: Build Tauri App

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
            args: "--target x86_64-pc-windows-msvc"
          - platform: ubuntu-latest
            args: ""
          - platform: macos-latest
            args: "--target aarch64-apple-darwin"

    runs-on: ${{ matrix.platform }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: tally_agent/package-lock.json

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'windows-latest' && 'x86_64-pc-windows-msvc' || '' }}
          args: ${{ matrix.platform == 'windows-latest' && '--profile release' || '--profile release' }}

      - name: Setup Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: tally_agent/src-tauri

      - name: Install frontend dependencies
        run: npm ci
        working-directory: tally_agent

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          args: ${{ matrix.args }}
          working-directory: tally_agent

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: tally-agent-${{ matrix.platform }}
          path: |
            tally_agent/src-tauri/target/release/bundle/**/*.exe
            tally_agent/src-tauri/target/release/bundle/**/*.msi
            tally_agent/src-tauri/target/release/bundle/**/*.dmg
            tally_agent/src-tauri/target/release/bundle/**/*.deb
            tally_agent/src-tauri/target/release/bundle/**/*.AppImage
          if-no-files-found: warn
          retention-days: 14
