name: Build Tauri App

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
          - platform: ubuntu-latest
          - platform: macos-latest

    runs-on: ${{ matrix.platform }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: tally_agent/package-lock.json

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          args: "--profile release"

      - name: Setup Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: tally_agent/src-tauri

      - name: Install frontend dependencies
        run: npm ci
        working-directory: tally_agent

      - name: Build Tauri app (Windows)
        if: matrix.platform == 'windows-latest'
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          args: "--bundles nsis"
          working-directory: tally_agent

      - name: Build Tauri app (Ubuntu)
        if: matrix.platform == 'ubuntu-latest'
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          args: "--bundles deb,appimage"
          working-directory: tally_agent

      - name: Build Tauri app (macOS)
        if: matrix.platform == 'macos-latest'
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          args: "--bundles dmg"
          working-directory: tally_agent

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: tally-agent-${{ matrix.platform }}
          path: tally_agent/src-tauri/target/release/bundle/**
          if-no-files-found: warn
          retention-days: 14
